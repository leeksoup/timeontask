{% extends "base.html" %}
{% block content %}
<h2>Edit Task #{{ task.id }}</h2>
<form method="post">
  <input type="hidden" name="sort" value="{{ sort }}" />
  <label>
    Title
    <input name="title" value="{{ task.title }}" required />
  </label>

  <label>
    Due date
    <input name="due_date" type="date" value="{{ task.due_date or '' }}" />
  </label>

  <label>
    Priority
    <select name="priority">
      <option value="" {% if not task.priority %}selected{% endif %}>No priority</option>
      <option value="1" {% if task.priority == 1 %}selected{% endif %}>High (1)</option>
      <option value="2" {% if task.priority == 2 %}selected{% endif %}>Medium (2)</option>
      <option value="3" {% if task.priority == 3 %}selected{% endif %}>Low (3)</option>
    </select>
  </label>

  <label>
    Project
    <select name="project_id" required>
      {% for project in projects %}
        <option value="{{ project.id }}" {% if project.id == task.project_id %}selected{% endif %}>{{ project.name }}</option>
      {% endfor %}
    </select>
  </label>

  <label>
    <input type="checkbox" name="is_completed" {% if task.is_completed %}checked{% endif %} />
    Completed
  </label>

  <button type="submit">Save</button>
  <a href="{{ url_for('tasks', sort=sort) }}">Cancel</a>
</form>
{% endblock %}
