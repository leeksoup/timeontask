<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Time on Task</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <header>
      <h1>Time on Task</h1>
      <nav>
        <a href="{{ url_for('dashboard') }}">Dashboard</a>
        <a href="{{ url_for('projects') }}">Projects</a>
        <a href="{{ url_for('tasks') }}">Tasks</a>
        <a href="{{ url_for('meetings') }}">Meetings</a>
        <a href="{{ url_for('weekly_goals') }}">Weekly Goals</a>
        <a href="{{ url_for('today') }}">Today</a>
        <a href="{{ url_for('end_of_day') }}">End of Day</a>
        <a href="{{ url_for('week_review') }}">Week Review</a>
      </nav>
    </header>
    <main>
      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <ul class="flash">
            {% for message in messages %}
              <li>{{ message }}</li>
            {% endfor %}
          </ul>
        {% endif %}
      {% endwith %}
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
